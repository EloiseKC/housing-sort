<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housing 2 — Category Sort</title>
  <style>
    :root {
      --bg:        #EDD9A3;
      --bg-circle: #F8EFD4;
      --text-dark: #4A2E12;
      --text-mid:  #9B7040;
      --text-soft: #C4A070;
      --accent:    #E8945A;
      --accent-dk: #C97940;
      --white:     #FFFFFF;
      --shadow:    0 4px 24px rgba(74,46,18,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-dark);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .progress-track { height: 5px; background: rgba(74,46,18,0.12); }
    .progress-fill  { height: 100%; background: var(--accent); transition: width 0.4s ease; border-radius: 0 3px 3px 0; }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px;
      background: rgba(237,217,163,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(74,46,18,0.1);
      flex-wrap: wrap;
    }
    .header-title { font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .name-input {
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(74,46,18,0.18);
      border-radius: 8px; padding: 7px 12px;
      font-size: 13px; color: var(--text-dark); width: 150px;
    }
    .name-input::placeholder { color: var(--text-soft); }
    .name-input:focus { outline: none; border-color: var(--accent); }
    .progress-label { margin-left: auto; font-size: 13px; font-weight: 600; color: var(--text-mid); white-space: nowrap; }
    .btn-submit {
      background: var(--text-dark); color: #fff; border: none;
      padding: 8px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background 0.2s; white-space: nowrap;
    }
    .btn-submit:hover:not(:disabled) { background: #6b4020; }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
    .main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 20px 16px; gap: 18px;
    }
    .item-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .item-circle {
      width: 220px; height: 220px; border-radius: 50%;
      background: var(--bg-circle);
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      cursor: grab; user-select: none;
      transition: border-color 0.2s, transform 0.15s;
    }
    .item-circle:active { cursor: grabbing; }
    .item-circle.dragging { opacity: 0.5; transform: scale(0.95); }
    .item-circle.is-assigned { border-color: var(--accent); }
    .item-thumb { width: 160px; height: 160px; object-fit: contain; pointer-events: none; }
    .item-thumb-ph {
      width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; font-size: 12px; color: var(--text-mid);
      padding: 16px; pointer-events: none;
    }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text-dark); text-align: center; }
    .item-badge {
      font-size: 11px; font-weight: 600; color: var(--accent-dk);
      background: rgba(232,148,90,0.15);
      padding: 3px 12px; border-radius: 99px; display: none;
    }
    .item-badge.visible { display: block; }
    .nav-row { display: flex; align-items: center; gap: 14px; }
    .nav-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(74,46,18,0.15);
      color: var(--text-mid); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--white); border-color: var(--accent); color: var(--accent-dk); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-counter { font-size: 13px; color: var(--text-mid); min-width: 56px; text-align: center; font-weight: 500; }
    .hint { font-size: 12px; color: var(--text-soft); }
    .done-panel { display: none; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
    .done-panel.visible { display: flex; }
    .done-panel .done-icon { font-size: 52px; }
    .done-panel h2 { font-size: 18px; }
    .done-panel p  { font-size: 13px; color: var(--text-mid); }
    .cat-bar {
      background: rgba(237,217,163,0.96);
      border-top: 1px solid rgba(74,46,18,0.1);
      padding: 12px 16px 14px;
      display: flex; gap: 10px; justify-content: center; overflow-x: auto;
    }
    .cat-bin {
      background: rgba(255,255,255,0.82);
      border: 2px solid rgba(74,46,18,0.12);
      border-radius: 18px; padding: 10px 14px; min-width: 86px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.15s;
    }
    .cat-bin:hover {
      border-color: var(--accent); background: var(--white);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(74,46,18,0.12);
    }
    .cat-bin.drag-over {
      border-color: var(--accent); background: #FFF5EC;
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(232,148,90,0.28);
    }
    .cat-bin.active-cat { border-color: var(--accent-dk); background: rgba(232,148,90,0.1); }
    .cat-icon    { width: 48px; height: 48px; object-fit: contain; pointer-events: none; }
    .cat-icon-fb { font-size: 32px; pointer-events: none; line-height: 1; }
    .cat-count {
      background: var(--text-dark); color: var(--white);
      font-size: 11px; font-weight: 700;
      padding: 2px 9px; border-radius: 99px;
      min-width: 26px; text-align: center; transition: background 0.2s;
    }
    .cat-count.filled { background: var(--accent); }
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--text-dark); color: var(--white);
      padding: 10px 24px; border-radius: 10px;
      font-size: 13px; z-index: 300; white-space: nowrap;
      transition: opacity 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .toast.success { background: #3a6e40; }
    .toast.error   { background: #6e3a3a; }
  </style>
</head>
<body>

<div class="progress-track">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<div class="header">
  <div class="header-title">🏠 Housing 2</div>
  <input type="text" class="name-input" id="respondent" placeholder="Your name">
  <div class="progress-label" id="progress-label">0 / 0</div>
  <button class="btn-submit" id="submit-btn" onclick="submitResults()">Submit</button>
</div>

<div class="main">
  <div class="item-wrap" id="item-wrap">
    <div class="item-circle" id="item-circle" draggable="true">
      <img class="item-thumb" id="item-thumb" src="" alt="">
      <div class="item-thumb-ph" id="item-thumb-ph" style="display:none"></div>
    </div>
    <div class="item-name"  id="item-name"></div>
    <div class="item-badge" id="item-badge"></div>
  </div>
  <div class="nav-row" id="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">←</button>
    <div class="nav-counter" id="nav-counter">— / —</div>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">→</button>
  </div>
  <div class="hint" id="hint">Click a category to assign — or drag this item onto it</div>
  <div class="done-panel" id="done-panel">
    <div class="done-icon">✅</div>
    <h2>All items assigned!</h2>
    <p>Enter your name above and click Submit.</p>
  </div>
</div>

<div class="cat-bar" id="cat-bar"></div>

<script>
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyTjLVNOO-v2BmbAcvJf9F9m7wgPPj32FfG6wPLjNJGoTtWaugY3Fd-5e0Tww5grPlVYQ/exec';

// ── FURNITURE — replace with your list ───────────────────────────────────────
const FURNITURE = [
  {id:1,   name:'Palm Plant'},
  {id:4,   name:'Modern Flat Screen TV'},
  {id:5,   name:'Classical Armchair'},
  {id:6,   name:'Industrial Dining Chair'},
  {id:7,   name:'Mid-Century Dining Chair'},
  {id:8,   name:'Cottage Sofa'},
  {id:11,  name:'Mid-Century Dining Table'},
  {id:18,  name:'Paper Bin'},
  {id:19,  name:'Modern Armchair'},
  {id:20,  name:'Egg Shell Armchair'},
  {id:21,  name:'Modern Sofa'},
  {id:22,  name:'Chesterfield Sofa'},
  {id:23,  name:'Industrial Coffee Table'},
  {id:24,  name:'Rustic Coffee Table'},
  {id:25,  name:'Marble Coffee Table'},
  {id:26,  name:'Stove'},
  {id:27,  name:'Chimney'},
  {id:28,  name:'Washing Machine'},
  {id:29,  name:'Tulip Table'},
  {id:30,  name:'Rustic Table'},
  {id:31,  name:'Rustic Chair'},
  {id:32,  name:'Modern Desk'},
  {id:33,  name:'Neon Desk'},
  {id:34,  name:'Executive Desk'},
  {id:35,  name:'Office Rolling Chair'},
  {id:36,  name:'Neon Rolling Chair'},
  {id:37,  name:'Executive Rolling Chair'},
  {id:38,  name:'Modern Oven'},
  {id:39,  name:'Retro Oven'},
  {id:40,  name:'Pizza Oven'},
  {id:41,  name:'Modern Fridge'},
  {id:42,  name:'Retro Fridge'},
  {id:43,  name:'Mini Fridge'},
  {id:44,  name:'Modern Kitchen Cabinet'},
  {id:45,  name:'Rustic Kitchen Cabinet'},
  {id:46,  name:'Marble Kitchen Cabinet'},
  {id:47,  name:'Modern Sink'},
  {id:48,  name:'Rustic Sink'},
  {id:49,  name:'Marble Sink'},
  {id:50,  name:'Trashcan'},
  {id:51,  name:'Dishwasher'},
  {id:52,  name:'Industrial Bed'},
  {id:53,  name:'Modern Bed'},
  {id:54,  name:'Racing Bed'},
  {id:55,  name:'Rustic Bed'},
  {id:56,  name:'Modern Nightstand'},
  {id:57,  name:'Rustic Nightstand'},
  {id:58,  name:'Round Side Table'},
  {id:59,  name:'Modern Bookshelf'},
  {id:60,  name:'Rustic High Shelves'},
  {id:61,  name:'Industrial Bookshelf'},
  {id:62,  name:'Retro Bookshelf'},
  {id:63,  name:'Modern Closet'},
  {id:64,  name:'Rustic Closet'},
  {id:65,  name:'Locker'},
  {id:66,  name:'Modern Double Drawer'},
  {id:67,  name:'Rustic Sideboard'},
  {id:68,  name:'Industrial Sideboard'},
  {id:69,  name:'Retro Sideboard'},
  {id:70,  name:'Modern Shelf'},
  {id:71,  name:'Rustic Shelf'},
  {id:72,  name:'Industrial Shelf'},
  {id:73,  name:'Neon Shelf'},
  {id:74,  name:'Modern Lamp'},
  {id:75,  name:'Rustic Lamp'},
  {id:76,  name:'Industrial Lamp'},
  {id:77,  name:'Sputnik Lamp'},
  {id:78,  name:'Monstera Plant'},
  {id:79,  name:'Plant Wall'},
  {id:80,  name:'Cacti'},
  {id:81,  name:'Modern Rug'},
  {id:82,  name:'Persian Rug'},
  {id:83,  name:'Boho Rug'},
  {id:84,  name:'Cow Rug'},
  {id:85,  name:'Dumbbell Rack'},
  {id:86,  name:'Punching Bag'},
  {id:87,  name:'Exercise Bike'},
  {id:88,  name:'Trophy Shelf'},
  {id:89,  name:'Guitar'},
  {id:90,  name:'Piano'},
  {id:91,  name:'Vintage Record Player'},
  {id:92,  name:'Jukebox'},
  {id:93,  name:'Skeleton'},
  {id:94,  name:'Vintage Globe'},
  {id:95,  name:'Telescope'},
  {id:96,  name:'Pin Board'},
  {id:97,  name:'Teddy Bear'},
  {id:98,  name:'Billard Table'},
  {id:99,  name:'Toy Box'},
  {id:100, name:'Arcade Machine'},
  {id:101, name:'Traffic Rug'},
  {id:102, name:'Aquarium'},
  {id:103, name:'Pet Bed'},
  {id:104, name:'Marble Statue'},
  {id:105, name:'Fishing Trophy'},
  {id:106, name:'Retro TV'},
  {id:107, name:'Curtain A'},
  {id:108, name:'Curtain B'},
  {id:109, name:'Speaker'},
  {id:110, name:'Coat Rack'},
];

const CATEGORIES = [
  {id:1, name:'Seating & Beds',    emoji:'🛋️', icon:'icons/cat1.png'},
  {id:2, name:'Tables & Surfaces', emoji:'🪵', icon:'icons/cat2.png'},
  {id:3, name:'Storage',           emoji:'📦', icon:'icons/cat3.png'},
  {id:4, name:'Appliances',        emoji:'🔌', icon:'icons/cat4.png'},
  {id:5, name:'Hobbies',           emoji:'🎸', icon:'icons/cat5.png'},
  {id:6, name:'Decor',             emoji:'🪴', icon:'icons/cat6.png'},
];

const assignments = {};
FURNITURE.forEach(f => assignments[f.id] = null);
let currentIndex = 0;

function renderItem() {
  const allDone = FURNITURE.every(f => assignments[f.id] !== null);
  const f = FURNITURE[currentIndex];
  document.getElementById('item-wrap').style.display  = allDone ? 'none' : '';
  document.getElementById('nav-row').style.display    = allDone ? 'none' : '';
  document.getElementById('hint').style.display       = allDone ? 'none' : '';
  document.getElementById('done-panel').classList.toggle('visible', allDone);
  if (allDone || !f) return;

  const thumb = document.getElementById('item-thumb');
  const ph    = document.getElementById('item-thumb-ph');
  thumb.src   = `thumbnails/${encodeURIComponent(f.name)}.png`;
  thumb.style.display = ''; ph.style.display = 'none';
  thumb.onerror = function() { this.style.display='none'; ph.style.display='flex'; ph.textContent=f.name; };

  document.getElementById('item-name').textContent = f.name;

  const catId = assignments[f.id];
  const cat   = catId ? CATEGORIES.find(c => c.id === catId) : null;
  const badge = document.getElementById('item-badge');
  badge.textContent = cat ? `${cat.emoji} ${cat.name}` : '';
  badge.classList.toggle('visible', !!cat);
  document.getElementById('item-circle').classList.toggle('is-assigned', !!cat);

  document.getElementById('nav-counter').textContent = `${currentIndex + 1} / ${FURNITURE.length}`;
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = currentIndex === FURNITURE.length - 1;

  renderCategories();
}

function renderCategories() {
  const bar    = document.getElementById('cat-bar');
  bar.innerHTML= '';
  const curCat = assignments[FURNITURE[currentIndex]?.id] ?? null;
  CATEGORIES.forEach(cat => {
    const count = FURNITURE.filter(f => assignments[f.id] === cat.id).length;
    const bin   = document.createElement('div');
    bin.className  = 'cat-bin' + (curCat === cat.id ? ' active-cat' : '');
    bin.title      = cat.name;
    bin.onclick    = () => assign(cat.id);
    bin.ondragover = e => { e.preventDefault(); bin.classList.add('drag-over'); };
    bin.ondragleave= () => bin.classList.remove('drag-over');
    bin.ondrop     = e => { e.preventDefault(); bin.classList.remove('drag-over'); assign(cat.id); };
    const icon = document.createElement('img');
    icon.src = cat.icon; icon.className = 'cat-icon';
    icon.onerror = function() {
      this.remove();
      const fb = document.createElement('div');
      fb.className='cat-icon-fb'; fb.textContent=cat.emoji; bin.prepend(fb);
    };
    const badge = document.createElement('div');
    badge.className  = 'cat-count' + (count > 0 ? ' filled' : '');
    badge.textContent= count;
    bin.appendChild(icon); bin.appendChild(badge); bar.appendChild(bin);
  });
}

function updateProgress() {
  const placed = FURNITURE.filter(f => assignments[f.id] !== null).length;
  document.getElementById('progress-fill').style.width = (placed / FURNITURE.length * 100) + '%';
  document.getElementById('progress-label').textContent = `${placed} / ${FURNITURE.length}`;
}

function assign(catId) {
  const f = FURNITURE[currentIndex]; if (!f) return;
  assignments[f.id] = catId; updateProgress();
  let next = FURNITURE.findIndex((item, i) => i > currentIndex && !assignments[item.id]);
  if (next === -1) next = FURNITURE.findIndex(item => !assignments[item.id]);
  if (next !== -1) currentIndex = next;
  renderItem();
}

function navigate(dir) {
  const n = currentIndex + dir;
  if (n < 0 || n >= FURNITURE.length) return;
  currentIndex = n; renderItem();
}

const circle = document.getElementById('item-circle');
circle.ondragstart = e => { e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain','item'); setTimeout(()=>circle.classList.add('dragging'),0); };
circle.ondragend   = () => circle.classList.remove('dragging');

async function submitResults() {
  const missing = FURNITURE.filter(f => !assignments[f.id]).length;
  if (missing && !confirm(`${missing} item(s) not assigned. Submit anyway?`)) return;
  if (!WEBHOOK_URL) { showToast('No webhook URL configured','error'); return; }
  const respondent = document.getElementById('respondent').value.trim() || 'Anonymous';
  const payload = {
    timestamp: new Date().toISOString(), respondent,
    session_id: Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    assignments: FURNITURE.map(f => ({
      id: f.id, name: f.name,
      category_id:   assignments[f.id] ?? '',
      category_name: assignments[f.id] ? CATEGORIES.find(c=>c.id===assignments[f.id]).name : 'Unassigned',
    })),
  };
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='Sending…';
  try {
    await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
    showToast('Submitted!','success'); btn.textContent='Submitted ✓';
  } catch { showToast('Submission failed','error'); btn.disabled=false; btn.textContent='Submit'; }
}

function showToast(msg, type='') {
  const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); },3000);
}

renderItem(); updateProgress();
</script>
</body>
</html>
